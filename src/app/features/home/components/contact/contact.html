<section class="w-full bg-[#0B1C2C] py-32 overflow-hidden">
    <div class="max-w-7xl mx-auto px-8 text-center">

        <!-- 🔹 TITULO -->
        <p class="text-xs tracking-[0.3em] text-[#272eac] font-medium mb-4 uppercase">
            Clientes
        </p>

        <h2 class="text-4xl md:text-5xl font-semibold text-white mb-6 leading-tight">
            Empresas que <span class="text-[#272eac]">confían</span> en nosotros
        </h2>

        <p class="text-gray-400 max-w-xl mx-auto mb-20 text-lg leading-relaxed">
            Relaciones construidas con confianza, resultados y compromiso a largo plazo.
        </p>

        <!-- 🔥 CARRUSEL -->
        <div class="relative overflow-hidden">

            <div class="clients-track">

                <div class="client-card group" *ngFor="let c of clientes">
                    <img [src]="c.logo" />

                    <!-- 🔥 NOMBRE -->
                    <span class="client-name">
                        {{ c.nombre }}
                    </span>
                </div>

                <!-- duplicado -->
                <div class="client-card group" *ngFor="let c of clientes">
                    <img [src]="c.logo" />
                    <span class="client-name">
                        {{ c.nombre }}
                    </span>
                </div>

            </div>

        </div>

    </div>
</section>
