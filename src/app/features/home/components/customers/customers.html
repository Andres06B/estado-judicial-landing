<section id="Clientes" class="py-28 bg-white overflow-hidden">

    <div class="max-w-7xl mx-auto px-6">

        <!-- HEADER -->
        <div class="text-center mb-20">

            <p class="text-xs tracking-[0.35em] text-blue-600 font-semibold uppercase mb-4">
                Clientes
            </p>

            <h2 class="text-4xl md:text-5xl font-semibold text-gray-900 leading-tight">
                Empresas que confían en
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-600">
                    nuestro trabajo
                </span>
            </h2>

            <p class="mt-6 text-lg text-gray-500 max-w-2xl mx-auto leading-relaxed">
                Acompañamos a firmas jurídicas, entidades financieras y empresas en todo el país,
                brindando acceso ágil a información judicial confiable para optimizar sus procesos legales.
            </p>

        </div>

        <!-- LOGOS -->
        <div class="relative cursor-pointer">

            <div class="flex gap-20 items-center animate-scroll">

                <div *ngFor="let client of clients.concat(clients)"
                    class="flex-shrink-0 flex flex-col items-center gap-3 group">

                    <!-- LOGO -->
                    <img [src]="client.logo" [alt]="client.name" class="h-10 md:h-12 object-contain
                   opacity-60 grayscale
                   transition-all duration-500 ease-out
                   group-hover:opacity-100 group-hover:grayscale-0 group-hover:scale-105">

                    <!-- 🏷 NOMBRE -->
                    <span class="text-xs text-gray-500 text-center max-w-[120px] leading-tight
                   transition-all duration-300
                   group-hover:text-gray-800">
                        {{ client.name }}
                    </span>

                </div>

            </div>

            <!-- FADES -->
            <div class="fade-left"></div>
            <div class="fade-right"></div>

        </div>

    </div>
</section>
