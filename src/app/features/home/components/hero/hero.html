<section id="Home" class="relative min-h-[90vh] flex items-center overflow-hidden">

    <!-- Background -->
    <div class="absolute inset-0 z-0">
        <img src="https://images.unsplash.com/photo-1589994965851-a8f479c573a9?q=80&w=1200&auto=format&fit=crop"
            alt="Oficina legal profesional" class="w-full h-full object-cover" />
        <div class="absolute inset-0 bg-gradient-to-r from-blue-900/95 via-blue-800/90 to-blue-700/80"></div>
    </div>

    <!-- Glow -->
    <div class="absolute top-20 right-10 w-72 h-72 bg-blue-400/20 rounded-full blur-3xl"></div>
    <div class="absolute bottom-20 left-10 w-96 h-96 bg-blue-300/10 rounded-full blur-3xl"></div>

    <div class="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20 lg:py-28">
        <div class="grid lg:grid-cols-2 gap-12 lg:gap-16 items-center">

            <!-- Content -->
            <div class="animate-fadeInUp">

                <!-- Badge -->
                <div
                    class="inline-flex items-center gap-2 bg-white/10 backdrop-blur-sm border border-white/20 text-white px-4 py-2 rounded-full text-sm font-medium mb-6">
                    <i class="fas fa-shield-alt text-blue-300"></i>
                    Bienvenidos a Estado Jurídico
                </div>

                <!-- Title -->
                <h1 class="text-4xl sm:text-5xl lg:text-6xl font-bold text-white leading-tight">
                    Apoyo Jurídico
                    <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-300 to-blue-100">
                        Profesional
                    </span>
                </h1>

                <!-- Description -->
                <p class="mt-6 text-lg text-blue-100/90 max-w-xl leading-relaxed">
                    Soluciones jurídicas confiables, rápidas y eficaces para profesionales del derecho.
                    Optimice sus procesos legales con nuestra plataforma especializada en Colombia.
                </p>

                <!-- Buttons -->
                <div class="mt-8 flex flex-col sm:flex-row gap-4">
                    <button routerLink="login"
                        class="cursor-pointer bg-white hover:bg-blue-50 text-blue-700 font-semibold text-base px-8 h-12 rounded-lg shadow-lg shadow-blue-900/30 flex items-center justify-center gap-2 transition">
                        Iniciar Sesión
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </div>

                <!-- Trust -->
                <div class="mt-12 flex flex-col sm:flex-row gap-6">
                    <div *ngFor="let item of trustItems" class="flex items-center gap-2 text-blue-100/80">
                        <i class="fas fa-check-circle text-blue-300"></i>
                        <span class="text-sm">{{ item }}</span>
                    </div>
                </div>

            </div>

            <!-- Cards -->
            <div class="hidden lg:block animate-scaleIn">
                <div class="grid grid-cols-2 gap-4">

                    <div *ngFor="let stat of stats"
                        class="rounded-2xl p-6 backdrop-blur-md border transition transform hover:-translate-y-1"
                        [ngClass]="{
                 'bg-white/10 border-white/20 text-white': !stat.highlight,
                 'bg-white text-blue-700': stat.highlight,
                 'mt-8': stat.offset
               }">

                        <div class="text-4xl font-bold mb-2">
                            {{ stat.value }}
                        </div>
                        <div class="text-sm opacity-80">
                            {{ stat.label }}
                        </div>

                    </div>

                </div>
            </div>

        </div>
    </div>

    <!-- Scroll Indicator -->
    <div class="absolute bottom-8 left-1/2 -translate-x-1/2 z-10 animate-fadeIn">
        <div class="w-6 h-10 rounded-full border-2 border-white/30 flex justify-center pt-2">
            <div class="w-1.5 h-3 bg-white/50 rounded-full animate-bounce"></div>
        </div>
    </div>

</section>
